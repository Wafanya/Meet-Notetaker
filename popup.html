<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; background: #1c1f26; color: rgba(255,255,255,0.85); font-family: 'Google Sans', Roboto, Arial, sans-serif; font-size: 13px; }
    .header { background: #13151a; padding: 14px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .logo { width: 34px; height: 34px; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; flex-shrink: 0; }
    .logo-text { font-weight: 500; font-size: 14px; }
    .logo-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 11px; color: rgba(255,255,255,0.45); display: block; margin-bottom: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
    input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 8px 10px; color: rgba(255,255,255,0.85); font-size: 12px; font-family: monospace; outline: none; transition: border-color 0.15s; }
    input:focus { border-color: rgba(255,255,255,0.3); }
    input::placeholder { color: rgba(255,255,255,0.2); }
    button { width: 100%; padding: 9px; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.8); font-size: 13px; font-family: inherit; cursor: pointer; transition: background 0.15s; }
    button:hover { background: rgba(255,255,255,0.12); }
    #status { font-size: 12px; text-align: center; min-height: 16px; }
    .ok  { color: #34d399; }
    .err { color: #fca5a5; }
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); }
    .hint { font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.6; }
    .hint a { color: #60a5fa; text-decoration: none; }
    .how { font-size: 11px; color: rgba(255,255,255,0.45); line-height: 1.6; }
    .how b { color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">N</div>
    <div>
      <div class="logo-text">Meet Notetaker</div>
      <div class="logo-sub">v5.0 · Caption scraping</div>
    </div>
  </div>
  <div class="body">
    <div class="how">
      Works by reading Google Meet's built-in captions — no audio recording, no API costs, all speakers captured automatically.
    </div>
    <hr>
    <div>
      <label>Notion Integration Token</label>
      <input id="token" type="password" placeholder="ntn_..." />
    </div>
    <div>
      <label>Database ID</label>
      <input id="dbid" type="text" placeholder="32-character ID" />
    </div>
    <button id="save-btn">Save settings</button>
    <div id="status"></div>
    <hr>
    <div class="hint">
      See <b>NOTION_SETUP.md</b> for setup help.<br>
      <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations →</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
